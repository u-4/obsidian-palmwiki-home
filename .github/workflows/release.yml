name: Prepare draft release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Confirm tag points to current main
        run: |
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Obsidian lint
        run: npm run eslint

      - name: Test
        run: npm test

      - name: Verify release metadata and assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run verify:release

      - name: Store verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            main.js
            manifest.json
            styles.css
          if-no-files-found: error
          retention-days: 1

  prepare-draft:
    needs: validate
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 3
          test "$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_SHA"
          test "$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq .sha)" = "$RELEASE_SHA"
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --draft \
            release-assets/main.js release-assets/manifest.json release-assets/styles.css
