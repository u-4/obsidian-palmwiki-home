name: Bug report
description: PalmWiki Homeの再現可能な不具合を報告します。
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Vault本文、個人情報、認証情報、非公開ノートは貼り付けないでください。
  - type: input
    id: plugin-version
    attributes:
      label: PalmWiki Home version
      placeholder: "0.4.0"
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "Desktop 1.12.7"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and device
      placeholder: "macOS / MacBook Air"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: 再現できる最小限の手順を書いてください。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: 個人パス、Vault本文、トークンを除去したものだけを添付してください。
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: 個人情報、Vault本文、認証情報を含めていません。
          required: true
